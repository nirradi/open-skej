name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    services:
      # The backend is Postgres-only: the driver and the identity layer share one
      # database. The Postgres-only tests skip without DATABASE_URL, but CI sets
      # it, so the whole suite runs here against a real database.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: skej
          POSTGRES_PASSWORD: skej
          POSTGRES_DB: skej
        ports:
          - 5432:5432
        # Without this the job can reach `pytest` before Postgres accepts
        # connections; the health check makes the runner wait.
        options: >-
          --health-cmd "pg_isready -U skej -d skej"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: black --check .
      - run: flake8 .
      - run: pytest
        env:
          DATABASE_URL: postgresql+psycopg://skej:skej@localhost:5432/skej

  rule-engine:
    name: Rule Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: rules/requirements.txt
      - run: pip install -r requirements.txt
      - run: black --check .
      - run: flake8 .
      - run: pytest

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/e2e
    services:
      # The backend Playwright boots is Postgres-only now. This service is the
      # disposable database it runs against; `global-setup.ts` migrates it to
      # head before the first test.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: skej
          POSTGRES_PASSWORD: skej
          POSTGRES_DB: skej
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skej -d skej"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      # Playwright boots both servers itself, so this job needs both runtimes.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/e2e/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt
      # The backend is started by playwright.config.ts, which falls back to
      # `python3` on PATH when there is no local venv — so the dependencies must
      # be installed into the interpreter setup-python just provided.
      - run: pip install -r requirements.txt
        working-directory: app/backend
      # The frontend webServer runs `npm run dev`, which needs its own install.
      - run: npm ci
        working-directory: app/frontend
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
        env:
          DATABASE_URL: postgresql+psycopg://skej:skej@localhost:5432/skej
      - uses: actions/upload-artifact@v4
        # The HTML report and traces are only worth keeping when something broke.
        if: failure()
        with:
          name: playwright-report
          path: app/e2e/playwright-report/
          retention-days: 7
